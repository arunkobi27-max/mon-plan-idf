<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligne 7 - Réseau Complet</title>
    <style>
        :root {
            --m7: #f59eb3; /* Rose Ligne 7 */
            --blue-idfm: #003ca6;
            --text: #000032;
            --bg-light: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text);
        }

        /* --- CONTENEUR --- */
        .map-container {
            background: white; padding: 40px 10px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 650px;
        }

        /* --- STRUCTURE LIGNE --- */
        .tronc { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .tronc::before {
            content: ""; position: absolute; top: 20px; bottom: 0;
            width: 10px; background: var(--m7); left: 50%; transform: translateX(-50%);
            z-index: 1;
        }

        /* --- SYSTÈME DE FOURCHE --- */
        .fork-area {
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; position: relative; margin-top: -2px;
        }
        .fork-junction {
            grid-column: 1 / span 2; position: relative; height: 50px;
        }
        .fork-junction::before {
            content: ""; position: absolute; top: 0; left: 25%; right: 25%;
            height: 10px; background: var(--m7); z-index: 1;
        }
        .fork-junction::after {
            content: ""; position: absolute; top: 0; bottom: 0;
            left: 25%; width: 10px; background: var(--m7);
            box-shadow: calc(250px + 10px) 0 0 var(--m7); /* Ajustement dynamique */
        }
        @media (max-width: 500px) { .fork-junction::after { box-shadow: 160px 0 0 var(--m7); } }

        .branch { position: relative; display: flex; flex-direction: column; align-items: center; }
        .branch::before {
            content: ""; position: absolute; top: 0; bottom: 0;
            width: 10px; background: var(--m7); left: 50%; transform: translateX(-50%);
        }

        /* --- STATIONS --- */
        .station {
            position: relative; width: 100%; min-height: 60px;
            display: flex; align-items: center; z-index: 2;
        }
        .dot {
            width: 18px; height: 18px; background: white;
            border: 4px solid var(--text); border-radius: 50%;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .info {
            position: absolute; left: calc(50% + 25px);
            display: flex; flex-direction: column; gap: 4px;
        }
        .branch.left .info { left: auto; right: calc(50% + 25px); align-items: flex-end; text-align: right; }

        .name { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; }
        
        /* Correspondances Badges */
        .corres-list { display: flex; gap: 4px; flex-wrap: wrap; }
        .badge {
            padding: 1px 6px; border-radius: 4px; font-size: 0.7rem;
            font-weight: bold; color: white; min-width: 16px; text-align: center;
        }
    </style>
</head>
<body>

<div class="map-container">
    <div class="tronc">
        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">La Courneuve - 8 Mai 1945</div>
                <div class="corres-list"><span class="badge" style="background:#ff8d7e">T1</span></div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Stalingrad</div>
                <div class="corres-list">
                    <span class="badge" style="background:#0055c8">2</span>
                    <span class="badge" style="background:#f28b00">5</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Gare de l'Est</div>
                <div class="corres-list">
                    <span class="badge" style="background:#bd0081">4</span>
                    <span class="badge" style="background:#f28b00">5</span>
                    <span class="badge" style="background:#f394c0">P</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Châtelet</div>
                <div class="corres-list">
                    <span class="badge" style="background:#ffbe00; color:black">1</span>
                    <span class="badge" style="background:#bd0081">4</span>
                    <span class="badge" style="background:#704b1c">11</span>
                    <span class="badge" style="background:#62259d">14</span>
                    <span class="badge" style="background:#e3051c">A</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Place d'Italie</div>
                <div class="corres-list">
                    <span class="badge" style="background:#f28b00">5</span>
                    <span class="badge" style="background:#79bb92">6</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Maison Blanche</div>
                <div class="corres-list"><span class="badge" style="background:#62259d">14</span></div>
            </div>
        </div>
    </div>

    <div class="fork-area">
        <div class="fork-junction"></div>
        
        <div class="branch left">
            <div class="station">
                <div class="dot"></div>
                <div class="info">
                    <div class="name">Porte de Choisy</div>
                    <div class="corres-list"><span class="badge" style="background:#ff8d7e">T3a</span><span class="badge" style="background:#00a88f">T9</span></div>
                </div>
            </div>
            <div class="station">
                <div class="dot" style="background:var(--text); border:none"></div>
                <div class="info"><div class="name">Mairie d'Ivry</div></div>
            </div>
        </div>

        <div class="branch right">
            <div class="station">
                <div class="dot"></div>
                <div class="info">
                    <div class="name">Le Kremlin-Bicêtre</div>
                    <div class="corres-list"><span class="badge" style="background:#999">BUS</span></div>
                </div>
            </div>
            <div class="station">
                <div class="dot" style="background:var(--text); border:none"></div>
                <div class="info">
                    <div class="name">Villejuif - L. Aragon</div>
                    <div class="corres-list"><span class="badge" style="background:#00a88f">T7</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
