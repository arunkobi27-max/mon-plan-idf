<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligne 13 - Réseau Complet avec Fourche</title>
    <style>
        :root {
            --m13: #00a88f; /* Turquoise Ligne 13 */
            --blue-idfm: #003ca6;
            --text: #000032;
            --bg-light: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text);
        }

        /* --- CONTENEUR --- */
        .map-container {
            background: white; padding: 40px 10px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 650px;
        }

        /* --- SYSTÈME DE FOURCHE NORD --- */
        .fork-area {
            display: grid; grid-template-columns: 1fr 1fr;
            width: 100%; position: relative; margin-bottom: -2px;
        }

        .branch { position: relative; display: flex; flex-direction: column; align-items: center; }
        .branch::before {
            content: ""; position: absolute; top: 0; bottom: 0;
            width: 10px; background: var(--m13); left: 50%; transform: translateX(-50%);
        }

        .fork-junction {
            grid-column: 1 / span 2; position: relative; height: 50px;
        }
        /* Barre horizontale de réunion */
        .fork-junction::before {
            content: ""; position: absolute; bottom: 0; left: 25%; right: 25%;
            height: 10px; background: var(--m13); z-index: 1;
        }
        /* Les deux petites barres qui descendent des branches */
        .fork-junction::after {
            content: ""; position: absolute; top: 0; bottom: 0;
            left: 25%; width: 10px; background: var(--m13);
            box-shadow: calc(250px + 10px) 0 0 var(--m13); 
        }

        /* --- TRONC COMMUN --- */
        .tronc { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .tronc::before {
            content: ""; position: absolute; top: 0; bottom: 20px;
            width: 10px; background: var(--m13); left: 50%; transform: translateX(-50%);
            z-index: 1;
        }

        /* --- STATIONS --- */
        .station {
            position: relative; width: 100%; min-height: 65px;
            display: flex; align-items: center; z-index: 2;
        }
        .dot {
            width: 18px; height: 18px; background: white;
            border: 4px solid var(--text); border-radius: 50%;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .info {
            position: absolute; left: calc(50% + 25px);
            display: flex; flex-direction: column; gap: 4px;
        }
        /* Branche de gauche : texte à gauche */
        .branch.left .info { left: auto; right: calc(50% + 25px); align-items: flex-end; text-align: right; }

        .name { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; line-height: 1; }
        
        /* Badges */
        .corres-list { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
        .badge {
            padding: 1px 5px; border-radius: 4px; font-size: 0.65rem;
            font-weight: bold; color: white; min-width: 15px; text-align: center;
        }

        .terminus { background: var(--text) !important; border: none !important; width: 12px; height: 12px; }

        @media (max-width: 500px) {
            .fork-junction::after { box-shadow: 160px 0 0 var(--m13); }
            .name { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="map-container">
    <div class="fork-area">
        <div class="branch left">
            <div class="station">
                <div class="dot terminus"></div>
                <div class="info">
                    <div class="name">Les Courtilles</div>
                    <div class="corres-list"><span class="badge" style="background:#ff8d7e">T1</span></div>
                </div>
            </div>
            <div class="station">
                <div class="dot"></div>
                <div class="info"><div class="name">Gabriel Péri</div></div>
            </div>
            <div class="station">
                <div class="dot"></div>
                <div class="info">
                    <div class="name">Mairie de Clichy</div>
                    <div class="corres-list"><span class="badge" style="background:#999">BUS</span></div>
                </div>
            </div>
        </div>

        <div class="branch right">
            <div class="station">
                <div class="dot terminus"></div>
                <div class="info">
                    <div class="name">St-Denis Université</div>
                    <div class="corres-list"><span class="badge" style="background:#ff8d7e">T5</span></div>
                </div>
            </div>
            <div class="station">
                <div class="dot"></div>
                <div class="info">
                    <div class="name">Basilique St-Denis</div>
                    <div class="corres-list"><span class="badge" style="background:#ff8d7e">T1</span></div>
                </div>
            </div>
            <div class="station">
                <div class="dot"></div>
                <div class="info">
                    <div class="name">Carrefour Pleyel</div>
                    <div class="corres-list"><span class="badge" style="background:#62259d">14</span></div>
                </div>
            </div>
        </div>

        <div class="fork-junction"></div>
    </div>

    <div class="tronc">
        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">La Fourche</div>
                <div class="corres-list"><span class="badge" style="background:#999">JONCTION</span></div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Place de Clichy</div>
                <div class="corres-list"><span class="badge" style="background:#0055c8">2</span></div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Saint-Lazare</div>
                <div class="corres-list">
                    <span class="badge" style="background:#837902">3</span>
                    <span class="badge" style="background:#009649">12</span>
                    <span class="badge" style="background:#62259d">14</span>
                    <span class="badge" style="background:#e3051c">A</span>
                    <span class="badge" style="background:#e041b0">E</span>
                    <span class="badge" style="background:#f394c0">J / L</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Invalides</div>
                <div class="corres-list">
                    <span class="badge" style="background:#e3b2d1">8</span>
                    <span class="badge" style="background:#ffdb00; color:black">C</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Montparnasse - Bienvenüe</div>
                <div class="corres-list">
                    <span class="badge" style="background:#bd0081">4</span>
                    <span class="badge" style="background:#79bb92">6</span>
                    <span class="badge" style="background:#009649">12</span>
                    <span class="badge" style="background:#f394c0">N</span>
                </div>
            </div>
        </div>

        <div class="station">
            <div class="dot"></div>
            <div class="info">
                <div class="name">Porte de Vanves</div>
                <div class="corres-list"><span class="badge" style="background:#ff8d7e">T3a</span></div>
            </div>
        </div>

        <div class="station">
            <div class="dot terminus"></div>
            <div class="info">
                <div class="name">Châtillon - Montrouge</div>
                <div class="corres-list"><span class="badge" style="background:#ff8d7e">T6</span></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
