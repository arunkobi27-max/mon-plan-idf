<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lignes de Métro - Mon Plan IDF</title>
    <style>
        :root {
            --blue-idfm: #003ca6;
            --bg: #f4f7f6;
            --text: #000032;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header avec bouton retour */
        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-back {
            text-decoration: none;
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            color: var(--blue-idfm);
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Grille des bulles de métro */
        .grid-lines {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .line-bubble {
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .line-bubble:hover {
            transform: scale(1.1);
        }

        /* Couleurs Officielles */
        .m1 { background-color: #FFCE00; color: black; }
        .m2 { background-color: #0064B0; }
        .m3 { background-color: #9F9825; }
        .m3bis { background-color: #98D4E2; color: black; font-size: 1.2rem; }
        .m4 { background-color: #C04191; }
        .m5 { background-color: #F28E42; color: black; }
        .m6 { background-color: #83C491; color: black; }
        .m7 { background-color: #F3A4BA; color: black; }
        .m7bis { background-color: #83C491; color: black; font-size: 1.2rem; }
        .m8 { background-color: #CEADD2; color: black; }
        .m9 { background-color: #D5C900; color: black; }
        .m10 { background-color: #E3B32A; color: black; }
        .m11 { background-color: #8D5E2A; }
        .m12 { background-color: #00814F; }
        .m13 { background-color: #98D4E2; color: black; }
        .m14 { background-color: #662483; }
    </style>
</head>
<body>

    <div class="header">
        <a href="../index.html" class="btn-back">← Accueil</a>
        <h1 style="color: var(--blue-idfm); margin: 0;">Lignes de Métro</h1>
    </div>

    <div class="grid-lines">
        <a href="1" class="line-bubble m1">1</a>
        <a href="2" class="line-bubble m2">2</a>
        <a href="3" class="line-bubble m3">3</a>
        <a href="3bis" class="line-bubble m3bis">3bis</a>
        <a href="4" class="line-bubble m4">4</a>
        <a href="5" class="line-bubble m5">5</a>
        <a href="6" class="line-bubble m6">6</a>
        <a href="7" class="line-bubble m7">7</a>
        <a href="7bis" class="line-bubble m7bis">7bis</a>
        <a href="8" class="line-bubble m8">8</a>
        <a href="9" class="line-bubble m9">9</a>
        <a href="10" class="line-bubble m10">10</a>
        <a href="11" class="line-bubble m11">11</a>
        <a href="12" class="line-bubble m12">12</a>
        <a href="13" class="line-bubble m13">13</a>
        <a href="14" class="line-bubble m14">14</a>
    </div>

</body>
</html>
