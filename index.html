<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Plan IDF - Accueil</title>
    <style>
        :root {
            --blue-idfm: #003ca6;
            --bg: #f4f7f6;
            --text: #000032;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            color: var(--text);
        }

        h1 { margin-bottom: 10px; font-weight: 800; color: var(--blue-idfm); }
        p { margin-bottom: 40px; opacity: 0.7; }

        /* Grille principale */
        .grid-transport {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        /* Style des cartes */
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            border-color: var(--blue-idfm);
        }

        /* Conteneur du symbole (M, RER, etc) */
        .symbol {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        /* Formes et Couleurs Spécifiques */
        .metro { border-radius: 50%; background-color: #003ca6; } /* Rond */
        .rer { border-radius: 15px; background-color: #e3051c; }   /* Carré arrondi */
        .train { border-radius: 15px; background-color: #90004f; } /* Carré arrondi */
        .tram { border-radius: 4px; border: 3px solid #0055c8; color: #0055c8; background: white; } /* Rectangle */
        .cable { border-radius: 15px; background-color: #9c6107; } /* Carré arrondi */

    </style>
</head>
<body>

    <h1>Mon Plan IDF</h1>
    <p>Choisissez votre mode de transport</p>

    <div class="grid-transport">
        
        <a href="metro" class="card">
            <div class="symbol metro">Métro</div>
            <span class="label">Lignes 1 à 14</span>
        </a>

        <a href="rer" class="card">
            <div class="symbol rer">RER</div>
            <span class="label">Réseau A à E</span>
        </a>

        <a href="train" class="card">
            <div class="symbol train">Train</div>
            <span class="label">Transilien</span>
        </a>

        <a href="tram" class="card">
            <div class="symbol tram">Tram</div>
            <span class="label">Lignes T1 à T13</span>
        </a>

        <a href="cable" class="card">
            <div class="symbol cable">Câble</div>
            <span class="label">Câble 1</span>
        </a>
        
    </div>

</body>
</html>
